name: 4. Build ChatFort
run-name: Build ChatFort (${{ github.ref_name }})
on:
  workflow_dispatch:
    inputs:
      distribution:
        description: "Distribution method"
        required: true
        default: "testflight"
        type: choice
        options:
          - testflight
          - adhoc
  schedule:
    # Rebuild every 2nd Sunday of the month to keep TestFlight fresh (90-day expiry)
    - cron: "33 7 * * 0"

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  check_certs:
    name: Check certificates
    if: |
      github.event_name == 'workflow_dispatch' ||
      vars.SCHEDULED_BUILD != 'false'
    uses: ./.github/workflows/create_certs.yml
    secrets: inherit

  build:
    name: Build
    needs: [check_certs]
    runs-on: macos-15
    steps:
      - name: Select Xcode version
        run: "sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer"

      - name: Checkout Repo for building
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Apply patches
        run: |
          if $(ls ./patches/* &> /dev/null); then
            git apply ./patches/* --allow-empty -v --whitespace=fix
          fi

      - name: Apply Brand Overrides
        run: python3 tools/BrandOverride/scripts/override.py --apply

      - name: Patch Match Tables
        run: |
          TABLE_PRINTER_PATH=$(ruby -e 'puts Gem::Specification.find_by_name("fastlane").gem_dir')/match/lib/match/table_printer.rb
          if [ -f "$TABLE_PRINTER_PATH" ]; then
            sed -i "" "/puts(Terminal::Table.new(params))/d" "$TABLE_PRINTER_PATH"
          else
            echo "table_printer.rb not found"
            exit 1
          fi

      - name: Install Project Dependencies
        run: bundle install

      - name: Sync clock
        run: sudo sntp -sS time.windows.com

      - name: Fastlane Build & Archive (TestFlight)
        if: github.event.inputs.distribution != 'adhoc'
        run: bundle exec fastlane build_chatfort
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Fastlane Build & Archive (Ad Hoc)
        if: github.event.inputs.distribution == 'adhoc'
        run: bundle exec fastlane build_chatfort_adhoc
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Fastlane upload to TestFlight
        if: github.event.inputs.distribution != 'adhoc'
        run: bundle exec fastlane release
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            artifacts
            buildlog
