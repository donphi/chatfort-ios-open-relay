name: "🎨 UI/UX Improvement"
description: "Report a visual glitch or suggest a UX improvement."
labels: ["ui/ux", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: "What looks or feels off?"
      placeholder: "Describe the visual or UX issue..."
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: "Where in the app?"
      placeholder: "e.g. Chat screen → long press on a message"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: "Suggested improvement (optional)"
      description: "How would you improve it?"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots (optional)"
      description: "Before/after mockups are very welcome!"
    validations:
      required: false
