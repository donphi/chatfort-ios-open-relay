name: "✨ Feature Request"
description: "Suggest a new feature or capability for Open UI."
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea that would make Open UI better? Describe it below!

  - type: textarea
    id: summary
    attributes:
      label: "Feature Summary"
      description: "A concise one-line description of the feature."
      placeholder: "e.g. Add ability to pin messages within a conversation"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem / Motivation"
      description: "What problem does this solve? Why would this be useful?"
      placeholder: "Currently when I want to... I have to... which is frustrating because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the feature as you'd like it to work. Include mockups or examples if possible."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any workarounds or alternative solutions you've thought about?"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Feature Area"
      description: "Which part of the app does this relate to?"
      options:
        - "Chat / Conversations"
        - "Voice Calls"
        - "Settings"
        - "Authentication / Servers"
        - "Channels"
        - "Notes"
        - "Folders / Organization"
        - "Attachments / Files"
        - "Appearance / Theming"
        - "Notifications"
        - "Widgets / Extensions"
        - "Performance"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Any other info, links, or references that would help."
    validations:
      required: false
